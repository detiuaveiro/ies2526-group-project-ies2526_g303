services:

  db:
    image: postgres:15
    container_name: smarthome-db
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - smarthome-db:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: smarthome

  rabbitmq:
    image: rabbitmq:3-management
    container_name: smarthome-broker
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"

  backend:
    build: ./backend/
    container_name: smarthome-backend
    restart: always
    depends_on:
      - db
      - rabbitmq
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/smarthome
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

  frontend:
    build: ./frontend
    container_name: smarthome-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - CHOKIDAR_USEPOLLING=true

  simulator:
    build: ./simulator
    container_name: smarthome-simulator
    restart: always
    depends_on:
      - rabbitmq
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672

volumes:
  smarthome-db:
